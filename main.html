
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gemini Web App</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #response-box { margin-top: 20px; padding: 15px; border: 1px solid #ddd; background: #f9f9f9; white-space: pre-wrap; min-height: 50px; }
    </style>
</head>
<body>


    <h2>Ask the AI</h2>
    <form id="ai-form">
        <textarea id="prompt" name="prompt" rows="4" placeholder="Ask me anything..." required></textarea><br>
        <button type="submit">Generate Response</button>
    </form>


    <div id="response-box">The response will appear here...</div>


    <script>
        document.getElementById('ai-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent page reload
           
            const prompt = document.getElementById('prompt').value;
            const responseBox = document.getElementById('response-box');
           
            // Show a loading state
            responseBox.innerText = "Thinking...";


            // Prepare the data to send to PHP
            const formData = new FormData();
            formData.append('prompt', prompt);


            try {
                // Send the POST request to our PHP backend
                const res = await fetch('process.php', {
                    method: 'POST',
                    body: formData
                });
               
                const data = await res.json();
               
                // Display the result or the error
                if (data.reply) {
                    responseBox.innerText = data.reply;
                } else {
                    responseBox.innerText = "Error: " + data.error;
                }
            } catch (error) {
                responseBox.innerText = "Fetch Error: " + error.message;
            }
        });
    </script>


</body>
</html>
